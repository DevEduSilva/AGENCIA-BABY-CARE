<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Agradecimento</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff;
            /* Azul claro */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .thankyou-container {
            text-align: center;
            padding: 2rem;
        }

        .thankyou-card {
            background: #ffffff;
            /* Branco */
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            max-width: 500px;
            margin: auto;
        }

        .thankyou-card h1 {
            color: #4682b4;
            /* Azul aço */
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .thankyou-card p {
            color: #5f9ea0;
            /* Azul cadete */
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .thankyou-card .button {
            display: inline-block;
            background: #4682b4;
            /* Azul aço */
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-size: 1rem;
            transition: background-color 0.3s ease;
        }

        .thankyou-card .button:hover {
            background: #5f9ea0;
            /* Azul cadete */
        }
    </style>
</head>

<body>
    <div class="thankyou-container">
        <div class="thankyou-card">
            <h1 class="theTitle">Obrigado(a) por confiar em nós!</h1>
            <p>Recebemos sua mensagem e logo entraremos em contato. Enquanto isso, aproveite para conhecer mais sobre
                nosso trabalho e como podemos ajudar sua família.</p>
            <a href="index.html" class="button">Voltar para o Início</a>
        </div>
    </div>
</body>

</html>
